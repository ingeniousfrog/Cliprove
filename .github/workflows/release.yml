name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "手动发布时填写 tag（如 v0.1.0）；留空则只构建产物不上传 Release"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-aarch64
            target: aarch64-apple-darwin
            tauri_bundles: dmg
          - os: windows-latest
            platform: windows-x64
            target: x86_64-pc-windows-msvc
            tauri_bundles: nsis,msi

    runs-on: ${{ matrix.os }}
    env:
      CI: "true"
      TAURI_BUNDLES: ${{ matrix.tauri_bundles }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify engine submodule
        shell: bash
        run: |
          test -d engines/douyin-downloader || (echo "douyin-downloader submodule missing" && exit 1)
          ls engines/douyin-downloader | head

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            sidecar/requirements.txt
            engines/douyin-downloader/requirements.txt

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build release bundle (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x scripts/*.sh
          ./scripts/build.sh

      - name: Build release bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          bash scripts/fetch-ffmpeg.sh
          bash scripts/build-sidecar.sh
          npm ci
          $bundles = $env:TAURI_BUNDLES -split ','
          npm run tauri build -- --bundles $bundles

      - name: Collect release assets (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release-assets
          shopt -s nullglob
          for pattern in \
            "src-tauri/target/release/bundle/dmg/*.dmg" \
            "src-tauri/target/release/bundle/macos/*.app.tar.gz"
          do
            cp $pattern release-assets/ 2>/dev/null || true
          done
          ls -la release-assets/

      - name: Collect release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $patterns = @(
            "src-tauri/target/release/bundle/nsis/*.exe",
            "src-tauri/target/release/bundle/msi/*.msi"
          )
          foreach ($pattern in $patterns) {
            Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue | Copy-Item -Destination release-assets
          }
          Get-ChildItem release-assets

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cliprove-${{ matrix.platform }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: cliprove-*
          merge-multiple: true

      - name: List release files
        run: find release-assets -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: Cliprove ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name, '-') }}
          files: release-assets/**/*
